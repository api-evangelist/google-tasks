apis:
  - name: Google Tasks API v1
    description: >-
      The Google Tasks API provides programmatic access to Google Tasks for
      managing task lists and individual tasks. Supports creating, reading,
      updating, deleting, moving, and clearing tasks.
    humanURL: https://developers.google.com/tasks
    baseURL: https://tasks.googleapis.com/tasks/v1
    properties:
      - type: OpenAPI
        url: openapi/tasks.yml
      - type: JSONSchema
        url: json-schema/tasks.json
    overlays: []
