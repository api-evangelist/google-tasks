aid: google-tasks
name: Google Tasks
description: >-
  The Google Tasks API lets you search, read, and update Google Tasks content
  and metadata. You can create, update, delete, and organize tasks across
  multiple task lists, move tasks between positions, and manage task completion
  status programmatically.
